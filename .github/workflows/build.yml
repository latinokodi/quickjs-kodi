name: Build QuickJS-NG

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1.13
      with:
        cmake-version: '3.25.x'

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"
      if: runner.os == 'Windows'

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      if: runner.os != 'Windows'

    - name: Build
      run: cmake --build build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: quickjs-binaries-${{ matrix.os }}
        path: |
          build/qjs*
          build/libquickjs*
          build/Release/qjs*
          build/Release/quickjs*

  build-android:
    name: Build for Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1.13
      with:
        cmake-version: '3.25.x'

    - name: Configure CMake for Android (${{ matrix.abi }})
      run: |
        cmake -B build-android -S . \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Android
      run: cmake --build build-android --config Release

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: quickjs-binaries-android-${{ matrix.abi }}
        path: |
          build-android/qjs*
          build-android/libquickjs*
          build-android/Release/qjs*
          build-android/Release/quickjs*
